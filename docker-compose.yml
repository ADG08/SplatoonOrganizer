services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: splatoon
      POSTGRES_PASSWORD: splatoon
      POSTGRES_DB: splatoon
    # Port not exposed: bot and migrate use internal network (db:5432).
    # For local dev with host access, uncomment: ports: - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splatoon -d splatoon"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    # Override entrypoint so we run sh (image default is "migrate"); then migrations + sleep to stay running.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "/usr/local/bin/migrate -path /migrations -database postgres://splatoon:splatoon@db:5432/splatoon?sslmode=disable up && touch /tmp/migrations-done && exec sleep infinity"
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/migrations-done"]
      interval: 2s
      timeout: 1s
      retries: 5
      start_period: 10s
    # No volume: migrations are in the image (Dockerfile.migrate). Required for Coolify.
    # Local: after adding a migration, run: docker compose build migrate && docker compose up -d
    depends_on:
      db:
        condition: service_healthy
    restart: "on-failure"

  bot:
    build: .
    env_file:
      - .env
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      DISCORD_OWNER_ID: ${DISCORD_OWNER_ID:-}
      DATABASE_URL: postgres://splatoon:splatoon@db:5432/splatoon?sslmode=disable
      CRON_SCHEDULE: ${CRON_SCHEDULE:-}
      RUN_WEEKLY_ON_START: ${RUN_WEEKLY_ON_START:-0}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data: {}
