version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: splatoon
      POSTGRES_PASSWORD: splatoon
      POSTGRES_DB: splatoon
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  migrate:
    image: migrate/migrate:v4.17.0
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://splatoon:splatoon@db:5432/splatoon?sslmode=disable",
        "up",
      ]
    volumes:
      - ./migrations:/migrations
    depends_on:
      - db
    restart: "on-failure"

  bot:
    build: .
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      DISCORD_CHANNEL_ID: ${DISCORD_CHANNEL_ID:-}
      DATABASE_URL: postgres://splatoon:splatoon@db:5432/splatoon?sslmode=disable
      CRON_SCHEDULE: ${CRON_SCHEDULE:-}
      RUN_WEEKLY_ON_START: ${RUN_WEEKLY_ON_START:-0}
    depends_on:
      - db
      - migrate
    restart: unless-stopped

volumes:
  db_data: {}
